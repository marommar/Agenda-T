<!-- 
  ============================================================================
  CLIENTES.HTML - VISTA DE GESTIÓN AVANZADA DE CLIENTES (Agenda-T)
  ============================================================================
-->
<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#006d44",
                        "secondary": "#456552",
                        "background": "#f6fbf4",
                        "surface": "#ffffff",
                        "on-surface": "#181d19",
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex">

    <!-- Sidebar de la vista -->
    <aside class="hidden md:flex h-screen w-64 rounded-r-xl sticky left-0 top-0 bg-white/60 backdrop-blur-md flex-col py-8 gap-2 shrink-0 border-r border-emerald-900/5">
        <div class="px-8 mb-12">
            <h1 class="text-xl font-black text-emerald-900 leading-tight">Agenda-T</h1>
            <p class="text-xs font-label uppercase tracking-widest text-emerald-900/60 mt-1">Gestión de Clientes</p>
        </div>
        <nav class="flex-grow flex flex-col gap-1 px-4">
            <a class="text-emerald-900/60 py-3 px-4 flex items-center gap-3 hover:bg-emerald-100 rounded-full transition-all" href="#">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="font-medium">Inicio</span>
            </a>
            <a class="bg-primary text-white rounded-full py-3 px-6 shadow-lg shadow-emerald-900/10 flex items-center gap-3" href="#">
                <span class="material-symbols-outlined">groups</span>
                <span class="font-bold">Clientes</span>
            </a>
            <a class="text-emerald-900/60 py-3 px-4 flex items-center gap-3 hover:bg-emerald-100 rounded-full transition-all" href="#">
                <span class="material-symbols-rounded">calendar_today</span>
                <span class="font-medium">Citas</span>
            </a>
            <a class="text-emerald-900/60 py-3 px-4 flex items-center gap-3 hover:bg-emerald-100 rounded-full transition-all" href="#">
                <span class="material-symbols-rounded">person_pin</span>
                <span class="font-medium">Personal</span>
            </a>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col w-full">
        <!-- Header -->
        <header class="w-full h-16 sticky top-0 bg-white/20 backdrop-blur-md flex justify-between items-center px-8 z-30">
            <div class="flex items-center gap-4">
                <div class="bg-white/80 rounded-full px-4 py-1.5 flex items-center gap-3 w-80 border border-emerald-900/5">
                    <span class="material-symbols-outlined text-outline">search</span>
                    <input class="bg-transparent border-none focus:ring-0 text-sm w-full" placeholder="Buscar clientes..." type="text" />
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button class="material-symbols-outlined text-emerald-800">notifications</button>
                <div class="h-8 w-8 rounded-full bg-primary/10 overflow-hidden ml-2 flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary">person</span>
                </div>
            </div>
        </header>

        <section class="p-8 md:p-12 max-w-7xl mx-auto w-full">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
                <div>
                    <h2 class="text-4xl font-extrabold text-on-surface tracking-tight mb-2">Directorio de Clientes</h2>
                    <p class="text-secondary font-medium">Gestiona tu base de datos de clientes de forma centralizada.</p>
                </div>
                <button id="btn-nuevo-cliente" class="bg-primary text-white px-8 py-4 rounded-full font-bold shadow-lg shadow-emerald-900/20 flex items-center gap-2 hover:scale-105 transition-transform">
                    <span class="material-symbols-outlined">person_add</span>
                    Nuevo Cliente
                </button>
            </div>

            <!-- Tabla de Clientes -->
            <div class="bg-white rounded-3xl p-6 shadow-xl shadow-emerald-900/5 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="text-left border-b border-emerald-900/5">
                                <th class="pb-6 pt-2 text-xs uppercase tracking-widest text-secondary/60 px-4">Perfil del Cliente</th>
                                <th class="pb-6 pt-2 text-xs uppercase tracking-widest text-secondary/60 px-4">Contacto</th>
                                <th class="pb-6 pt-2 text-xs uppercase tracking-widest text-secondary/60 px-4">Estado</th>
                                <th class="pb-6 pt-2 text-xs uppercase tracking-widest text-secondary/60 px-4">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="clientes-tbody" class="divide-y divide-emerald-900/5">
                            <!-- Los clientes se cargan dinámicamente -->
                            <tr>
                                <td colspan="4" class="py-12 text-center text-secondary/60">Cargando base de datos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
